<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Clips Hub🔥</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

.container {
  position: relative;
  width: 100%;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  background: red;
  width: 0%;
}

.controls {
  position: absolute;
  right: 10px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.controls button {
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 50%;
  font-size: 18px;
}

.download {
  position: absolute;
  bottom: 70px;
  left: 20px;
  padding: 12px 20px;
  background: red;
  color: white;
  border: none;
  border-radius: 6px;
}

.caption {
  position: absolute;
  bottom: 130px;
  left: 20px;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<div class="progress" id="progress"></div>

<video id="video" autoplay muted></video>

<div class="caption" id="caption">Loading...</div>

<div class="controls">
  <button onclick="like()">❤️</button>
  <button onclick="share()">📤</button>
</div>

<button class="download" id="download">Earn Now</button>

</div>

<script>

const API_KEY = "MRe3FgoiM1YVKSdDdGJewTMNt2p7jAqZAjtdO49P5R5ZiMxst7qcVHSs";

let videos = [];
let index = 0;

const video = document.getElementById("video");
const progress = document.getElementById("progress");
const caption = document.getElementById("caption");
const btn = document.getElementById("download");

// 💰 income links
const links = [
  "https://jackknifemonuments.com/iqq8d08uku?key=f36db480bbf38177cfe6e09005072a99",
  "https://jackknifemonuments.com/czvhzv16ab?key=db14db6ec2b6a69125f43befee10ac0f",
  "https://jackknifemonuments.com/gi2t2biny?key=93529c4ad367cb041d408f46e3ae9584"
];

// 🔥 load vertical videos only
async function loadVideos(){
  let res = await fetch("https://api.pexels.com/videos/search?query=people&per_page=30", {
    headers: { Authorization: API_KEY }
  });

  let data = await res.json();

  // 👉 vertical filter
  videos = data.videos
    .filter(v => v.width < v.height) // 🔥 vertical only
    .map(v => ({
      src: v.video_files[0].link,
      caption: v.user.name
    }));

  if(videos.length === 0){
    loadVideos(); // retry
    return;
  }

  loadVideo(0);
}

// load video
function loadVideo(i){
  video.src = videos[i].src;
  caption.innerText = "🔥 " + videos[i].caption;

  let random = links[Math.floor(Math.random()*links.length)];
  btn.onclick = () => window.open(random);
}

// next
function nextVideo(){
  index++;

  if(index >= videos.length){
    loadVideos(); // 🔥 নতুন API call
    index = 0;
  }

  loadVideo(index);
}

// auto next
video.addEventListener("ended", nextVideo);

// progress bar
video.addEventListener("timeupdate", () => {
  let p = (video.currentTime / video.duration) * 100;
  progress.style.width = p + "%";
});

// swipe animation
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;

  if(startY - endY > 50){
    video.style.transform = "translateY(-100%)";
    setTimeout(() => {
      video.style.transform = "translateY(0)";
      nextVideo();
    }, 200);
  }
});

// like
function like(){
  alert("❤️ Liked!");
}

// share
function share(){
  if(navigator.share){
    navigator.share({
      title: "Watch this video",
      url: window.location.href
    });
  } else {
    alert("Share not supported");
  }
}

// start
loadVideos();

</script>

</body>
</html>
